front:
  text: 蓬萊山西竈還丹歌卷上斯五
  hash: sha256:001b024e669e3baac6bf57a3bc2cdfda1571451d6c4334aa612fdd758275250e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0315_HFL_001-001a, image: hfl/0593/0593-004.png}
body:
  text: 漢檢校僕射金紫光祿大夫黃玄鍾撰臣聞鷦鷯在木不逾一枝之巢偃鼠飲河無過一腸之滿伏惟陛下名逾東户調美南風在於兆民無不咸止何重萬乘之榮而輕不死之道臣伏以元封年奉詔蓬萊親求妙術經過海難涉歷幽陽不憚危亡而求至道先是皇恩遠賚以感微臣盡忠得遇大仙躬賜靈藥極誠進上何謂陛下安聽佞臣信為祅詐賜臣自餌臣俄别皇庭不勝悲望遊宫未遍少許十年恐慮從容自為水阻又承陛下令東方朔召西王母夜置承露盤即知陛下後悔之甚臣又聞事君盡忠在朋立義於君不忠則人臣共罰不義於朋則交友共棄臣於紫陽宫少微院西竈躬受還丹妙道訖依方潛録伏惟陛下須納忠臣諫必效此方莫比昔年却從俗佞其藥令左拾遺陳方景搗合右丞周真宜候火臣男志誠啓罏并醮等必鍛鍊精微願勤誠志紫瓊暫逢長為金骨陛下莫重含元大內為上極精華北闕西堂殊非至廣太常九部不足為聲粉黛諸房全為醜質矧此蓬萊妙絶殊境得號仙山日殿月宫雲房金閣堂排金碧樓焕珊瑚鵲繞靈芝鸞飛瓊樹天男玉女沸鼎絃歌異鳥名禽朝來不歇水精簾外颯颯玄風碧玉户中泠泠細雨瓊漿一飲少許千年大藥暫餐應期萬載等間見桑田為海水見海水作桑田或即上朝天老或自適雲關時下入瀛洲散尋異寶寰中黃屋不足為尊補衮之流未足為貴陛下何不生親異境而苦戀凡間目看冠葬石堂身埋后土使子孫空拜瀝酒寒陵朝暮之間即當見矣縱百年天子不及一日仙人伏惟聖智審裁莫自求其斃矣謹差南陽執藥童奉表以聞蓬萊山南陽紫微右長丞黃玄鍾頓首謹言僉舉臣此聖道世不異求惟在清齋存心念靜設罏安竈不得抵忤方神舉措發機須合天道其石藥等並須上好草藥勿令錯誤其藥皆是州土進上唯三般出臣此山以人間六味替用並列如後石藥黃牙歌一首是造黃牙五言草藥形狀名採時節應用生死一百七十二味草藥歌都合計一百六十八首造黃牙第一歌曰鋪壬為疊疊鉛黃粉次重重牛酉白黃三色依東尾鹹漿味共通一安丙丁上齊入赤炎中右依歌並須重重以壬盡為度應夏至之節以冰石研之佳依東尾忌甲戊庚除定等日露容草第二俗為地録書云石録莖花赤性毒惡理求體脈生巖石出河南生甲乙死戊己甲寅葉圓春分後二十日採上治惡瘡應春分節歌曰此藥人間有河南出最珍拈來和汞點一夜應天真霜容草第三俗為天涯書為白微性與上同出荆南道生甲壬死戊癸引蔓三花應夏至節立春後採之歌曰繞樹攀崖上三花葉對峯拈來埋乙地依東尾法還入癸壬中雙夫草第四俗名芙蔓書為紫瓊性與上同治勞出安南府生丙丁死甲己葉紫緑大小不定應小暑節立夏後採用歌曰引蔓生天水池中好開花傍石間度宵丙丁候姹女體須堅石天第五俗為綸草書為武草性淡毒生朔方埧形金長色青生甲壬死丁卯治汞又治腸風歌曰遍地開尖葉尋山展緑微用漿應夏至採須鴻雁歸石玄第六俗為荼蔓書為録支性溫堅汞色緑生戊己死丁壬治腹癰應小暑節立秋後採用歌曰蔓黑開青葉還生野澤中從容安丙上唯能巨壯功萬年春第七俗名水藍書為地鏡性冷生江南道如藍小青老赤生戊丁死甲己治小兒疳應大寒節春分後十日採用歌曰青色尖赤樣如藍亦在高山亦在潭先共還丹為舍宅亦能性冷味能甘千秋錦第八俗呼地幕書為青喬性溫出劍南生甲乙死戊己葉大如手面皺治大風應大暑節立夏後採用歌曰面緊開敷繞澗泉大時尖緑小時圓唯有劍南生最好真人呼作草丹田年年春第九俗呼蒔芝書為青心性熱生嶺南道生戊壬死丁己葉紫治白風應清明節立秋後採之歌曰葉紫枝青繞水頭春風到日自芳幽可憐紅展仙人愛八般石藥總拘留寒蟬葉第十俗為美草盡為溫草出巴蓬州形如蟬葉苗青赤不定生戊丁萎甲戌治赤白帶下應雨水節立秋後採之歌曰葉如蟬翼帶如繩常在潭邊映水澄恰到用時合三五八銖金粉汁三升千靈第十一俗為水蒿書為白章支性冷出蕃中形如蒿數葉色青生丙戊死甲壬治惡瘡及酒癥應驚蟄節立冬後採之歌曰叢叢吐葉繞澤生夏時花發近春青紅竈更添將內煮一旬藥內此多靈赤馬州第十二俗為地容書為紫蓋性毒出北濟莖葉紫生甲壬死丁己療嘔逆應春分節春分後採之上歌曰枝紅葉紫繞山崖此藥真人暗以排恰到罏中開竈後始知我有玉靈才萬日榮第十三俗呼胡波薐書為美菜性善生河北葉青花紫生甲己死丁壬治惡瘡應夏至節白露後採用歌曰薐頭片片剪刀裁每歲真人自送來欲得紫房無紫艷拈來共煮石中胎寒泉鏡第十四俗為大葉萍書為池容性涼出雲南葉圓浮水上生丙丁死甲乙治惡瘡應小滿節立夏後採上歌曰浮生池中葉青青碧牙藥內最多靈從此水銀加日影黃金爭得不聞名洞章支第十五俗為周支書為盧容性熱出羅州葉緑枝白醭生甲丁死戊己治毒風應小滿節立夏後採用歌曰葉青莖醭生乎墳有茨開花似覆盆還丹不得池中過仙人爭得萬年魂公無取第十六俗為石藤書為潤春出長安南山上葉如豆引蔓紫生丁己萎戊壬治惡瘡應大寒節白露後採上歌曰叢叢紫影出長安生在春初色耐寒薄闕採時防大雨摘時仍慮萬妖看天鏡寒第十七俗呼石扇書云背青出河南道每一枝一葉生戊壬死甲己治冷應立夏節原缺後採上歌曰葉如紈扇繞崖生每樹還生一箇莖丘墓死泉無用效絶人斷犬始為靈逍逍引第十八俗呼紫貝藤書為崖艾性冷出三元縣葉鋭應白露節冬至後採上歌曰抽枝引蔓發金蘭但是真人手把看欲度紫微天上闕可憐光彩入仙壇尸解紅第十九俗呼石被書云地紋性溫出揚州形如水萍枝莖細生乙癸死酉戌治一切五藏反惡應小寒節立夏後採上歌曰緣崖近石翦成形紫閣蓬萊有兩名獨體丹陽兼汞煮後兹火下絶銅聲仙節芝第二十俗呼石䔲書云九積性涼出河南形尖細擁節生戊丁死乙癸治熱悶腳氣應秋分節立冬後採用歌曰天上全無人世有人間不識自凋零今朝自開好金訣從此君王記取名遍金臺第二十一俗呼馬莧書為緑微性冷出河陽府葉鋭圓醭生甲丁死壬己治瘡及惡癤應寒露節立冬後採用歌曰同羅新婦未仙時折得金臺數百枝經得三周周甲子三年身駕慶雲飛輕金微第二十二俗為石支書呼上遠出樂陽治通耳歌曰寒葉叢叢繞路逵天上為珍世上稀拈向白英鍋內煮始知此藥最多奇高天芝第二十三俗為京人丹書為天莫出洛州治中風歌曰紅珠為子樹青青紫苑仙人别作名還共丹陽為白色緑微始肯入玄冥寒瑶池第二十四俗呼玉池柳書云英芝出江州莖青白葉尖細治牙疼風疳歌曰山庭玉柳本來無更説人間是已疏堪用採時須少與藥院仙囊莫遣餘翦成荷第二十五欲呼山甘菊書云莟夫樣似甘菊治鬼氣歌曰先生白日上升天還因此藥每宵煎及至採時須便用不須將過五湖船同巨舟第二十六俗為石桑書為景芝出蠻中葉如桑成樹治一切風歌曰彤彤山艷怯高坡因此承陽出處多將得便須隨用却莫令天使渡江河天上玄第二十七俗為石甘書為地甘出忠萬州葉緑生石上治反胃病歌曰石中有火火藏陰陽氣潛生效比金採日用須防犬吠犬吠採之用不任石天琴第二十八俗呼石可書云還芝葉三色治一切風歌曰京州皇郡人人病病者還因地氣衝添放還丹經宿煮從兹百歲絶無風毛章第二十九俗為大成書云林芝性冷出河南道形如蔢𦺞治風瘇歌曰此朴雕成花擁節毳毛籠裏子分枝可憐此物人間有惆悵人間識是誰右已前八味生甲壬死乙癸應冬至節立春後採用成萬歲第三十俗為五靈芝書無名葉紫性冷治鬼氣心邪歌曰搖揚錦蔓出長安對雪開花入上闌不要春榮潛茂實大羅天女鎮長餐粟金寒第三十一俗呼皺面書為武芝性溫出恆州葉大如手面皺治風癬歌曰葉葉鋪沙遍地生仙人多種繞仙庭但知戊己庚辛日採之何得不通靈胡菊花第三十二俗呼楊柳池書為闌心草性溫葉如柳引蔓治女人血氣歌曰緑金散翠引金條緑葉零丁繞碧霄三月春時和蔓採可憐汞在火中燒右已前三味生戊己丁死甲乙應大寒節立冬後採上天尖金第三十三俗為胡署蔓書為美容性熱有毒治蟲蛇毒出美元縣樣如署預歌曰厚葉青金愛在溪可憐仙藥俗人迷欲得飛升天上去只將此藥是雲梯玉展春第三十四俗為山斛書為江春性溫出于闐國三葉葉如榆治風歌曰每樹生三葉遙光葉似榆冬分春節近仙人把步虛荆豆蔓第三十五俗為真芝書無名性溫出劍南三葉葉如豆治血風歌曰每葉生仙意含虛得大音三旬金匱裏不用未投深夜合木第三十六俗為還心書為松南出商州成樹葉小夜即合治心狂歌曰美樹低新葉晨開暮掩枝可憐天上木堪載俗人飛紫方天第三十七俗為楊葉芥書無名性熱出青州葉如楊長數寸有津液治一切風邪歌曰小葉傍山開真人手自栽從兹辨真藥目下往天台王䔲第三十八俗為青風書無名有毒一叢數葉出䔲美茂治經脈并痔歌曰地開玉葉展枝叢獨自抽莖占碧空石藥數般能壓伏唯共陰神最得功紅蓬第三十九俗呼石劍書無名性熱出甘州一叢數刃治一切風歌曰錦石苔生雲雨處紅蓬能展劍鋒形消湯煮玉無過此因得仙人别作名胡辛蔓第四十俗名三葉草書名深真有毒出江州葉三尖治蟲毒歌曰枝條條葉葉如刀近夏當秋蔓始高恰到第三三轉後始將方就火中燒紫仙芝第四十一俗呼天池書無名性熱葉如枇杷葉治心痛歌曰搖搖仙果長山溪堪作蓬萊方丈梯每在人間人不識桃源因此去人迷石豆蔓第四十二俗為留君書云單章性冷毒葉尖引蔓莖紫青治蟲毒歌曰黑玉為莖金作芳抽條引蔓散巖岡秦南少女當時用抽汞無煙在火鐺山石蔓第四十三俗呼真魚書無名性溫出文代州葉三尖如大豆治逆瘡歌曰玉鋪金器寫人間苗在蓬宫果在田應是五心須似雪況當諸物擬昏煙玉粟草第四十四俗為行針書無名出河南性冷如還藤有子如糜治風熱歌曰調金鋪玉顆如珠天上人間樣有殊天上生時生紫翠人間有者緑疏疏層金第四十五俗呼小署藥書無名性溫出辰錦州葉如署藥有根治水病歌曰埋根金匱展蓬頭造化真人昔日留五轉轉開須好記煮將為水五金柔地蘇也石蕨第四十六俗為失菉書云留金性熱出楚地枝次數葉治風冷歌曰銅瓶內裏布丹霜霜似煙籠未有光忽更添消重固際可憐顔色過於璋荆蔛第四十七俗呼槿木花書無名性溫出山南道蔓四稜葉尖治血氣歌曰叢開尖葉四稜莖光占春分滿野生後輩習真皆用此即知從此得長生重臺蔓第四十八俗為人眷書云渠迫性熱出江南道小小葉生大葉引蔓治一切瘡歌曰隆隆真氣上升天恰至春分降野田若遇青鹽相拌合即知生駕出人間還骨草第四十九俗呼鼠英蒿書云單蒿性熱生劍州一如蒿莖紫葉破治風瘡歌曰塠塠埋處是千還輪轉存亡上碧山但能識此鍋中煮火罷金身出世間稍紫第五十俗呼紫貝書無名治癰瘇歌曰排蔓抽莖繞碧溪四時改變採人迷直須好記莫令錯萬里蓬萊此是梯寒石葵第五十一俗為附蒿書云間芝葉圓似蒿性堅治風歌曰山含山色繞山庭無限仙人種在京唯共丹陽陽粉合一朝煮罷絶銅聲絹文蔓第五十二俗為蛇蔥書呼宜人性熱出蘄州如絹文治反胃歌曰排蔓開枝長緑溪可憐氣力與山齊若能連夜添魚水白骨埋年尚也回雞腸蔓第五十三俗為林更書無名性溫出白州葉如難腸治一切難産歌曰引蔓開枝萬里生抽條得色占春榮從此丹陽無黑色汞中須有紫河名烏金腳第五十四俗呼太芝書名不祥性熱出江陵府腳如烏叉葉如蕨治腰腳歌曰插金烏腳散寒山學道仙君望眼穿從此既合含元識切須不使别人傳蛇銜菊第五十五俗為單芝書云未有性溫出太原葉如蛇銜花似菊治喉閉歌曰前草含花似緑楊花排金蔓引溪傍採日切須防孝子犬吠罏人被鬼傷還椿第五十六俗為哲芝書闕名性溫出安南狀如椿色紫治邪氣歌曰落落金字展青天紫道人間玄又玄若共還丹從此造即須煮過十宵看金桃蔓第五十七俗呼留恐書云單夫性溫出河中府狀如葡萄引蔓歌曰刻出青羅展緑微真人不遣俗人知玄河河內但能煮汞迷金章繞紫衣地第五十八俗為針花書無名性熱生湖州葉文如繭大指面治癲澗歌曰三三葉葉映枝紅最向還丹道有功但向汞中二更煮任拈直用火墻籠稍紅第五十九俗為穿崖布書云紫天天亦名武容朱芝性涼生于闐國一枝一葉葉背紫枝歌曰界外繞林泉必向經鐺煎三度煮八石如何體不堅右已前二十七味生丁己死戊壬應冬至後採狗舌蔓第六十俗為魚藻書無名性寒出陳許州引蔓如狗舌治蛇毒歌曰狗舌還如狗舌形俗客真人字兩名不是人間無此草渡江見孝用無靈玉壘第六十一俗為番頭書無名性涼生岐雍花如蓋幢花稍紫治霍亂歌曰花如纛幟葉如緋山北河南各兩儀欲採之時須固惜內園莫使外人知玉蒢第六十二俗呼閏芝書名兊性冷出濟南莖微葉小色黃治熱痢歌曰秦王得地擬求仙恰到岐陽岐上山向遇洞真親指點交共礬石一處煎紅草第六十三俗無名書云單齒性溫出河西道葉如柑色赤石上生治浮瘇歌曰引雲首月生崖上鏤出王公入羽衣若見鳳凰他自舞不須晉客把笙吹粟金第六十四俗無名書為單舟性涼出綿遂州抽莖葉尖圓治一切血氣歌曰堂堂仙藥在人間恰見凡人似等間若共金沙和夜煮即知長在比龜年紫石莧第六十五俗呼云裳書為紫蓋性熱出通州如莧三道治骨癰歌曰通芝三背影朧朧丹藥藥中最有功不等能添金色潤又能一夜煮黃銅浮真草第六十六俗呼交綿書云大羅性溫出鄆州如豌豆以花葉治血暈歌曰陽陽紅影繞人途人間雖有世間無若遣衛真天女見必應摘滿滿裾裾土芩第六十七俗為江中草書云牽女蔓性溫引蔓有子治腸結歌曰緑楊幽院家家有恰取玄河用者稀從此內園須剩種用方莫使外人知石青第六十八俗為帶青書云關渠性熱出單州引蔓葉尖治氣結歌曰碧陽天子獻金丹須兹神水合和餐若向青鍋鍋內著可憐雪散及人看窈冥第六十九俗呼石衣亦云魚衣書云太周性熱出江陵府如石衣治冷氣歌曰窈窈冥冥石上生人間雖有不知名大藥之中安少許即知足下慶雲迎右已前十味生甲丁死戊已應立秋節立夏二十日採上還年第七十俗為木相珠書云含紫性溫出崑崙葉如榆上有珠治風歌曰天長地久水洋洋靈草含珠色自芳從此月濱濱海上又堪煮鍊作瓊漿歷章第七十一俗呼南天書無名性溫出鳳翔府四稜花紫葉尖小治一切惡冷疾歌曰紅章寺裏生春草不似春終見歷章若向白天鍋內合即知九雪散精光紫金茅第七十二俗呼齊蒿書無名性冷出劍南莖紫青葉尖長治心痛歌曰青青新婦獨行行勿遇金華繞院生因折將來煮金地無煙從此始知名紫海椿第七十三俗為交周書無名性熱出江州葉如椿色紫成樹治中風歌曰同同金匱影春山無限真人手把看一種自糜開樣度不如此箇起金丹金微第七十四俗為重金書無名性溫出劍南繞石生葉如雷蔥有子根治小兒疳歌曰離陽新婦愛芝魚獨寄仙翁萬紙書因識金微煮寒石河車身駕入青虛紫蓼大夫第七十五俗呼鄉周一名石蓼書無名出河北道色紫治心痛歌曰花周萬里對秦川萬里雖生不肯言若共三河同更煮生身應踏九霄天石芥第七十六俗為地花書為南草性溫出京中葉如南芥菜治小兒驚歌曰紫微天女不裁衣會要人間石芥枝忌向白章鍋裏煮便將砂毒水銀飛山稜第七十七俗為澗下芝書云莫上芝性冷出益州葉如波稜翦成治風歌曰丁丁伐木聲從鳥渺渺江波草自靈唯有山稜宜好採八般石藥自然成尖尾葵第七十八俗呼為風草書無名性寒出恆定州一葉三尖治一切惡瘡歌曰渭州河北便生此生處人多泠曝之五鹽共煮為鄞鄂如何不得命長時王騎第七十九俗為緑天書云無慶性溫出江南道葉如車前莖文治毒瘡歌曰都都太府青丹藥要此靈媒作主人從此和漿方服了眼前親見萬年春尖苟蔓第八十俗呼大對生劍南葉如苟引蔓治惡瘡歌曰人生不識金丹意尖苟須為玉藥泥不説硫黃添白色亦能瓶內伏雌砒成天命第八十一俗呼有命書無名性冷出忠萬州治熱病餘不言歌曰玉陽宫女煮天漿要得成天命始香須與水銀開徑路兼為青丹作院墻朝天草第八十二俗為鬼尿筒書無名性冷出同華州心空有節長治惡瘡歌曰遙遙天影入端虛同華生時匝地鋪看取紫河車內草無此黃金事不居輔蟬質第八十三俗呼九宗丹亦云景天書無名性冷出漁陽縣葉如車前引蔓根長治熱疾歌曰團團翦葉出蘭枝唯有漁陽出得時三殿西埋十月用然堪入藥和精微金鎖天第八十四俗為灰藋書云落藜性溫出巴南葉方小赤治上氣歌曰金天剩進遣成灰須共黃牙拌作泥從此水銀須壓伏只此還丹路是梯還蔛蔓第八十五俗云天毋書無名性溫出美原縣引蔓三葉治血暈歌曰千尋山石上遍川萬古人傳出美原六戊鍋中經宿煮八般頑石自無煙同陽芰第八十六俗呼馬齒菜書無名性冷葉圓味滑治腸熱出單方州歌曰茸茸引蔓滿單方能共還丹作郡鄉水銀不敢當頭坐謾趁朱砂迷在鐺同陽糜第八十七俗為人莧書為結針性冷出蕃中葉尖治疳疾歌曰調神理魄發銀光石藥兹囊作一方今日玉階依表進亦能壓伏四神霜同巨天第八十八俗為紅鹽花亦為慶節蒲書無名性溫出益州葉尖狹花如茨治血氣歌曰同巨宫中同巨天燒成灰燼煮寒泉陽壬不得此灰過陰癸終須飛作煙芙花舟第八十九俗呼米囊書無名性涼出黔南葉青青花含子治惡熱悶歌曰青天萬里入幽無唯有花舟接道隅雖共根苗和藥煮一般沉石自然浮右已前二十味生戊壬死丁己應立夏節立秋前四十日採用同變春第九十俗呼崑崙葵書為紫階出西天葉圓成角花紫治油瘇歌曰巔巔孤上占崖栽每在人間院內開恰至還丹能計會硫黃爭得不當灰狐孫藤第九十一俗為地錢書無名性熱出最南引蔓葉尖枝有聲治惡瘡歌曰遙遙引蔓繞天津長至南風不至春三月進來朝帝意欲使生身踏碧鱗石渠第九十二俗呼下魚菜書無名性涼出開通州葉如竹花黃治小兒疳歌曰碧花洞裏展江魚萬藥之中最是模療得紫丹黃色潤兼洗青丹色脫朱右已前三味生戊丁死甲乙應立冬節後二十日採上魚腸蔓第九十三俗為靈花書為茨梨性溫出宣州河北葉如馬莧有茨治惡瘡歌曰人間有藥是魚腸解與還丹好作方三鼎煙中開瑞色九霄宫裏鎮靈香山菊第九十四俗為真浮人書無名性冷出渭南縣葉如茶花似菊治酒病心忪歌曰花如黃菊葉如茶俗人不識出仙家能與青丹出顔色兼將紅粉作黃牙單真第九十五俗為薺蘋書無名出河南府性熱葉如薤近水生治蛇咬歌曰天真天地本由人自是凡夫不識真從此八靈甘受死凡人自此免為塵金鏡寒第九十六俗為人芝書無名出安南府如葵菜有毛治蟲蛇毒歌曰石中石上總秋生葉上生毛紅點莖三接外幾數般樣樣中最好是東京青枝第九十七俗為苦啓木書無名出西龍州性冷成樹有枝條治腳氣歌曰成木生條長萬山西王親種在人間善使青礬無惡氣又能不失紫金班紫樓春第九十八俗為白馬菜書無名又為留著菜葉紫青尖出江州歌曰堂堂開色紫樓春獨占人間白背鱗還丹藥就須添煮青霄得上九天真輔天台第九十九俗為背醋木書無名性溫成樹帶子出終南山治反胃歌曰籠籠成樹長南山萬木之中此最賢天藥燒時須剩點應得生身白骨全徑金骨第一百俗為緑魚沼書名天文芋性溫如茅有果治漏胎歌曰疏疏引葉恰如茅每歲真人玉水澆能與還丹生羽翼凡人身喫入青霄木瓜第一百一俗為天同果歌曰搖搖天樹長巴南帶日花繁每日含大藥合時須剩裂經秋採摘始宜堪零零草第一百二俗為無青書無名性冷出巴州一叢三兩葉含露治疫病歌曰一叢花帶葉零零人間知好不知名看取藥成金色美取之符呪鬼神驚右已前十味生戊子死甲巳應立秋節夏至後立冬前後採之蓬萊山西竈還丹歌卷上
