body:
  text: 漢檢校僕射金紫光禄大夫黄玄鍾譔黄帝春第一百三俗爲芙蓉水書無名性冷花紫黄不定遶水生治毒風歌曰棟宇雖生梁柱功還丹道要水芙蓉若說西王生最好南山採得用通同山濁第一百四俗爲水濁書無名每枝三葉如蒴𧃔治風血歌曰玉樓開鏡影三山此草生時不等閑若不高峯峯石上即須長養在崖泉畢録秋第一百五俗爲白茂樹書無名成樹葉如柳出嶺外道治一切惡瘡歌曰天長月在碧霄懸月在千山萬藥前採合藥時須記取拈共黄牙一處煎浮林池第一百六俗爲地皺書無名葉如柳面皺性熱治冷風歌曰玉塘水泠泠天心此藥將堪價比金能共硫黄相把捉就中最好走鉛壬鶴來枝第一百七俗爲女貞書無名宜治霍亂歌曰平平天地自侵臨不到龍門是海深仙藥人間成樹木人間不識自埋沉山紫蘇第一百八俗爲界州萊書無名出歙州宣州莖紫葉如眞紫蘇性冷歌曰玉潭深底見深波好藥人間核似羅唯共丹陽除黑色染成如雪石中磨調神芝第一百九俗呼爲還骨書無名出忠萬州如句樹宜治癆及狂癲歌曰人間自有草還丹抛向人間不肯餐任是生來還又死可憐仙藥放教閑香䈥引第一百一十俗爲綿木是書無名生茂州性温成樹木内有綿治血擁氣歌曰逍遥天路道能平自是凡夫不學生能取此來和汞煮眼前爭不白雲迎崖藍一百一十一俗爲附槽草書無名味苦有毒一葉數尖如燖草治白風歌曰金成似玉火中砂此草多靈伴作牙心共女人同火本只縁不伏是河車懾龍迴第一百一十二俗爲豫樟木書無名有毒葉大三指成樹孟夏州近漢山有之治鬼注歌曰稍稍同木也同材張騫乘上碧雲來此樹生過一千歲一切江河路自開右已前十味生甲壬死戊壬應立冬節並春分及秋分前後採之紫雞腸第一百一十三俗爲水蔓書無名性熱出江南道近水生引蔓治癰瘇歌曰碧谿生處遶閑蹊後學眞人路自迷壬癸硬時須好煮若過再宿耎如泥壽容第一百一十四俗爲冬青書無名性温出河北道葉青成樹有子治折傷歌曰四時不改黛雲遮解共還丹作一家千歲生時空服食况論與汞作河車蘆口寒第一百一十五俗爲英芝書爲奉宜性冷出雲安葉圓小莖治中風歌曰團團天地卵成形靈草仙方帀地生此物堪將救人世今朝由惜載仙經帶絲金第一百一十六俗爲楸樹書無名性冷出綿劍州成懸絲治婦人經脉不通歌曰萬條垂下緑金絲仙藥人間總不知須向炎中汞身在即須百過入玄微防石硝第一百一十七俗爲銷草竹書爲草苟芝性熱出廣州葉圓如指莖備治惡寒毒歌曰三峽峽中千水氣化成寒草廣州生八石煙中爲父子九天天上又多名禦酒醒第一百一十八俗爲丹芝書爲樓春草性冷出河内道三花葉色青治心痛歌曰青丹消酒縁何事靈草先須煮度宵從此飲多醉便醒況拈同向火中燒暹玉芝第一百一十九俗爲浮水藍書無名性冷出嶺外道如小藍葉尖長治肺癰歌曰行行遶澗起青苗八石同功力不饒一切罏中須少許不然同向火中燒琵琶芝第一百二十俗爲附除書爲白天性冷出雲南葉圓長帶子治大風歌曰秦王天上玉京東曾有眞人上碧空因得琵琶芝草喫生身身坐紫陽宫土燖蔓第一百二十一俗爲巨玉書爲勞寒性冷出巴蓬州葉三尖引蔓治風病歌曰盈盈方知天台上須共青鹽引白漿砒上有煙煙不起即須要此作籬墻銅蹄蔓第一百二十二俗爲太玉芝書云林芝性冷出秦川有葉尖長引蔓治風邪歌曰東王公母行雲雨恰遣銅蹄蔓不生惟須陛下秦川採採時不得預稱名胡金毒第一百二十三俗爲瘴天樹書無名有毒出雲南治蛇毒樹不高三尺葉尖破味殺人歌曰陰陽不交生此樹味毒枝條不肯高第二亥河河内煮即知陰癸不炎消尋河草第一百二十四俗爲江風書無名性冷出黔南生苗長數丈治喜病歌曰巨海海長千萬里此藥尋河二復然問取張騫必知處採時切忌用鹽煎精蕈第一百二十五書俗無名色黄白無苗莖不應節不治病歌曰春時生即多黄白秋夏生時帶黑青殿前但問東方朔此人知處又知名石渠第一百二十六俗爲寒竹草書無名性冷殺蟲出荆南如竹苗長歌曰遍地敷天長翠根功能定魄又安魂但是人家三月種此户當知足子孫野成荷第一百二十七俗爲槃草書無名性冷出淮南道葉大如盤有根子歌曰全身長養在溪傍詔取張騫問本鄉採得根苗一時剉又能煮白惡丹陽含金枝第一百二十八俗爲紫檀書無名性温出嶺南樹有金影治五般蛇毒歌曰排金金影影重重此樹人間不易逢臣到鼇山山北面眞人親手賜玄鍾地脈第一百二十九俗爲茨芋書無名性冷出在五湖葉長一尺根同治一切熱病歌曰温凉日月浸長天好藥人間自滿田八石之中安少許永知金骨骨長存金影銅第一百三十俗爲黄楊木書無名性冷出茂州能治大風歌曰林林萬木凡木盛唯有此眞聖眼穿若欲採時玉龍入不得如常似等閑潭沉草第一百三十一俗爲支頤天書無名性冷出錦州葉細莖長色青黄治瘰癧歌曰沉沉細草遶閑谿委葉抽條傍水坻無限眞人喫仙去二親曾贈右軍妻紫殿第一百三十二俗爲負霜花書無名出河北道葉指面大紫莖治焦熱歌曰玉陽宫女學藏鉤紫殿藏形形自收飛得九天天女局仙經抄出至今留武陽種第一百三十三俗爲連天草書無名性温出崑崙苗長葉細治骨癰歌曰纖纖細草武陽種生苗引稼避春風大藥藥中功最甚見水不得莫從容尖玉第一百三十四俗爲人壽書無名性冷葉大如手似車前治馬㿍歌曰遶湖水澗入天山苗高數尺葉尖圓白金一片如霜在亦是靈芳豈得全不月芝第一百三十五俗爲無菌書無名性温天下有色紫赤無莖治惡瘡歌曰陰陽繁氣自然生不受陰陽一月情能共水銀相壓伏陽王當共失柔情海通第一百三十六俗爲顔芝書無名性温出嶺外葉如通背白治經脉不調歌曰先朝太后教人採自後人間更不尋莫說金丹丹内用人間若得過於金吴網草第一百三十七俗書無名性毒出江淮成樹葉如兩指治贄盤歌曰葉葉能生生似月服之得本便神仙况共還丹同煮鍊金骨如何不得全吴梨蘆第一百三十八書俗同一名性温出江南有蔓引枝治金瘡歌曰蓱蓱引蔓葉如藤汞中最巧又多能打薄不成但更煮還須軟膩引如繩吴粟隨第一百三十九俗爲間芝書無名性温有毒出雲南細葉有子治泠病歌曰金章亂引碧英花吴蜀生時各兩家恰至採時須致意採時不得日光斜遶崖還第一百四十俗爲略杓苗書無名出蜀有引蔓帶子治漏瘡歌曰章敬天皇天女仙因得兹靈得上天今朝既識三眞草必知朝見舊羲軒金花舟第一百四十一俗爲拜婦芝書無名性冷出渭南尖葉莖長治諸風歌曰登登紅葉遶青冥萬朵英花帀地生採取之時問方朔唯君不得犯神靈遶河公第一百四十二俗爲赤柳書無名性冷出梓州如樹亦治癖結塊歌曰仙人自美種天台每歲眞人密遣開方朔去年家亦有詔看何不進將來菵草第一百四十三俗書無名性毒出蜀地成樹葉大如兩指治瘡癬歌曰長生遠地生靈草能共還丹一處行不與諸方兼色潤唯能善合水銀情䔧蘆第一百四十四俗書無名性温出蜀有蔓引皮治金瘡歌曰名山深處有日月照中生還爲丹輔佐朱生不敢爭續隨草第一百四十五俗爲間芝書無名性毒細葉有子治泠歌曰地滿千河廣山含百草靈從兹九天到山涯見玉京元卷更諸色藥無歌共八十五味如後天將將大猪猪乾女芝烏飛鸞花秦女羅蝦䗫菜天女衣浮眞孤兒三泉菜九尾蟲秦眞人雷葱青青玉女花天生芝鏤玉草孤羊茵花零零草防石消白馬菜石劍天都水紫蘇婦羞芝人面菜石母孤蒿陳公車水巨勝輔魚脂天筒鬼幕江猪耳秦地班苦瓢花羊尾狗耳歸末草白楊芝白鮮皮鬼芋單煎武陽種團錦衣寒加草芋茵大段二尺頰萬里長御酒醒苟艾苟椒白茂樹金影同天堂女神荆細辛紫苦味陳后蕈高羊尾南風紅母草常春瘴天樹拜婦芝石花石芝芙人春蘆靈草奉眞人竹堂紫檀秦女芝山紫蘇狗銜草天台樹草山姑草銅蹄蔓皺面草霖雨淫草白花木紫神芝右計八十五味白蘿頻第一百四十六俗爲雲芝書爲紫扇性善出嶺南葉如油撥圓缺苗紫青不定生戊丁萎甲壬高數尺治滑痢應白露節立秋五日採之歌曰不高數尺葉如油常在高山上嶺頭此物雖生立春後用之力足待經秋青天心第一百四十七俗爲白微書爲單蒿性凉生于闐國葉如蒿三瓣成枝青黄花生甲戊死丁壬治中傷應立冬節白露後採之上歌曰花如金色遶山開葉成三片翦刀裁計會水銀成活後兼能善作大還媒鳳凰窠第一百四十八俗爲山竹書爲負雪容性冷出南天竺國葉如竹枝如木如葱尾花紫生甲丁死戊己治反花瘡應處暑節立夏後採用歌曰葉如寒竹傍崖生亦在人家亦在庭花帶紫緋開不定可憐光彩四時榮赤蘿藤第一百四十九俗呼赤蕦草書爲地心性冷味苦形如桐葉色紫赤出新羅國治逆瘡生戊壬死丁癸應小寒節立春後採之歌曰葉如緋榜遶欄生亦在山頭亦在庭欲謝但知投九水水中自識紫芝靈白鶯相第一百五十俗呼三葉草書爲紫余性和諸藥生中天竺國無枝三葉生戊庚治勞疾應芒種節立秋後採之歌曰蔓開三葉葉纖纖半在池傍半在巖欲識但經和日煮月過成鍊以爲鹹掃天魚第一百五十一俗爲碧章芝書爲絹文草性寒冷出瑞州葉如指面不高數尺生甲戊死丙丁治水病應立冬節冬至後採歌曰谿生文理緋絹字周帀年年葉轉青摘日用時須忌諱忌諱無過見水精奉眞人第一百五十二俗爲水結書爲黄茨性熱出岱州葉緑有子生甲丁死癸己治牙疼應寒露節小暑後採歌曰莖莖白色遶山崖重重開葉傍花排緑水池邊安少許青丹從此絶塵埃天周芝第一百五十三俗呼石柳書爲地芝性熱出隴右形如楊柳不高數尺歌曰枝同楊柳色青青秋景凋零春景榮不遇至人親指引縱能何處覓清名水桃第一百五十四俗爲緑紅書爲英芝性温出江州廬山生戊丁死庚己形如桃近水生治癰瘇應大寒節春分後採之歌曰靈芝異草出靈山立幹生於曲澗泉好用英華散水氣採時須得受春暄幽微芳第一百五十五俗爲石髓書爲地微性冷生湖南葉小花細生戊丁死甲乙治胸隔氣熱應立秋節處暑後採之歌曰叢叢細葉小花排亦在平坡亦在崖翦出西王南架草審看莖脚小於釵緑重重第一百五十六俗爲重臺草書爲茨影子性温出隴右葉小大重疊生丙丁死庚己治惡瘡應芒種節立春後採歌曰葉中有菓最多功天上人間一樣同採摘之時須淨潔易中將用應屯蒙山錦芝第一百五十七俗爲山雲臺書爲九孔菜性冷出咸陽枝葉一如雲臺生甲丁死卯酉治一切熱風應冬至節驚蟄後採之歌曰枝條體本遶山嵐亦在崖中亦在潭若向花中頻煮後即知從此味能甘縷金寒第一百五十八俗爲紫石蘋書爲江蘄性温有毒出終南山葉如翦出莖紫生戊丁死乙癸治氣腫應立秋節立冬後採之歌曰月光金閣引眞人第三池内最多神恰是立冬冬後採採時須避鶴鳴群貝殊紫第一百五十九俗石蔓書爲地油性冷出白馬山葉圓引蔓生甲乙死戊己治急勞應小寒節春分後採之歌曰引蔓排枝葉葉圓可憐生處傍崖泉八石不應無用日用時須待緑芙研鶴春芝第一百六十俗爲烏脚雞草書爲細芝草性熱出荆州葉小枝莖細生戊壬死甲乙治滑痢應夏至節小暑後採之歌曰鏤出西王裙帶花枝莖纖細出仙家採摘之時須淨潔仍憂金影向西斜石節第一百六十一俗爲寒種書爲擁春性熱出藍田縣葉大銳枝紫有節生癸己死子午治心痛應白露節立冬後採之歌曰葉如桑葉莖如節愛向巓崖崖上生若向人間能辟鬼又能天上懾神靈右已前應節候六甲冷熱採之靈石椿第一百六十二俗爲景芝書爲黄風出江南道治心嘔逆歌曰枝枝抽蔓傍崖巖海脉滋通味帶鹹翦出紫陽天上草堪將人世煮紅鹽石胡蔓第一百六十三俗爲九田書爲天周出貝州治妳癰歌曰遥遥引蔓入天羅後學仙君莫厭多採日採時防大雨將行不用渡江波吟鶴枝第一百六十四俗爲石葉書爲間盧出代州一枝數葉生石上治一切風冷歌曰龍芝鳳蘂出奇山時居月磧傍崖巓空生柳坻明絮後和汞一處用鹽煎右已前性温熱生甲壬死乙癸應冬至節立春後採之土竹第一百六十五俗爲金蘋書爲更芝性冷出河北樣如竹莖青治喉閉生戊丁死甲乙應大寒節立冬後採之歌曰纖枝小葉色青青天上人間有兩名此物四時看不定落花時節採多靈紫金英第一百六十六俗爲石心書爲魚葉性熱有毒出羅州葉圓背紫治惡瘡生甲己死戊壬應春分節立夏後採之歌曰音世人間草葉圓貝點朱還同玄内煮沉石自然浮日水蘇第一百六十七俗爲太平書無名性温出陳許州葉如紫蘇莖紫治一切瘇歌曰葉裁金底皺金光生在長年緑水傍别有眞人來採用紫陽宫内軟衣裳石紫蔓第一百六十八俗爲努頭草書爲示見性熱出新羅葉蔓莖有茨治惡瘡歌曰葉葉彎彎遶澗隅可憐眞草世人疏唯有太行南山客將來箇箇煮仙魚紫貝蘿第一百六十九俗爲鏡寒書無名性熱出羅州莖紫葉出花上歌曰婆娑紫葉長藤蘿山野生時亦不多採得却能除百疾惜乎生没在巖阿千桑蔓第一百七十俗爲花桑書爲敬桑性熱生陳許州葉葉引蔓治腰背疼歌曰傳得仙人玉樹方當年陳許獲親嘗採時齋戒忘言話服餌除疼壽命長水菊第一百七十一俗爲金縁書無名出河南府葉如喬花如菊治一切水氣浮瘇歌曰人間到處種難成遠地幽林却自生生處定須無别樹周迴荆棣密層層獐蹄第一百七十二俗爲蘄芝書無名性冷葉如獐蹄莖紫治滑漏歌曰俗號花桑葉似條條長引蔓遶谿傍還共獐蹄同氣味一時和合入冰湯蓬萊山西竈還丹歌卷下
